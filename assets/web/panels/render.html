<h2 class="section-title">{{render_page.title}}</h2>
<p class="section-subtitle">{{render_page.sub}}</p>

<div class="grid">
  <div class="card">
    <div class="section-title" style="font-size:18px">{{render_page.current}}</div>
    <table>
      <tr><th>{{common.item}}</th><th>{{common.desc}}</th></tr>
      <tr><td>{{render_page.path}}</td><td id="render-rule-dir" class="mono"></td></tr>
      <tr><td>{{common.duty}}</td><td id="render-responsibility-text"></td></tr>
      <tr><td>{{common.rule}}</td><td id="render-principle-text"></td></tr>
    </table>
  </div>
</div>
